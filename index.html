<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CreditCheck Dashboard</title>

    <!-- H-05: CSRF token — included in API fetch headers via X-CSRF-Token.
         Value is regenerated on each page load (client-side guard). -->
    <meta name="csrf-token" content="" id="csrf-meta" />
    <script>
      document.getElementById('csrf-meta').setAttribute(
        'content',
        typeof crypto !== 'undefined' && crypto.randomUUID ? crypto.randomUUID() : Math.random().toString(36).slice(2)
      );
    </script>

    <!-- M-02: Content Security Policy
         Restricts resource loading to known trusted origins.
         Notes:
           - 'unsafe-inline' for styles is required by the inline-style-heavy React app.
             Migrate to CSS classes to eventually remove this exception.
           - fonts.googleapis.com / fonts.gstatic.com are required for IBM Plex / Geist.
           - No CDN script sources needed — xlsx is now bundled locally (M-01 fix).
           - connect-src allows fetching from the configured API endpoint domain.
             Update if your VITE_API_ENDPOINT is on a different domain.
    -->
    <meta http-equiv="Content-Security-Policy"
      content="
        default-src 'self';
        script-src  'self' 'unsafe-inline' https://accounts.google.com;
        style-src   'self' 'unsafe-inline' https://fonts.googleapis.com;
        font-src    https://fonts.gstatic.com data:;
        img-src     'self' data: https://lh3.googleusercontent.com;
        connect-src 'self' https://ibancheck.io https://accounts.google.com https://www.googleapis.com ws://localhost:5173 ws://localhost:*;
        frame-src   https://accounts.google.com;
        frame-ancestors 'none';
        base-uri    'self';
        form-action 'self';
      "
    />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%23005EFF'/><path d='M16 6L8 11v8c0 4.4 3.4 8.5 8 9.5 4.6-1 8-5.1 8-9.5v-8L16 6z' fill='white'/><path d='M13 16l2.5 2.5 4-4' stroke='%23005EFF' stroke-width='2' stroke-linecap='round' stroke-linejoin='round' fill='none'/></svg>" />
    <!-- Google Fonts — loaded once at HTML level (not re-injected on theme toggle) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&family=Geist:wght@300;400;500;600;700;800;900&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
