version: "3.9"

services:
  # ─── PostgreSQL ──────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: creditcheck_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: creditcheck_user
      POSTGRES_PASSWORD: changeme           # Override via .env in production
      POSTGRES_DB: creditcheck_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d  # Auto-runs 001_initial.sql on first start
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U creditcheck_user -d creditcheck_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Backend API ─────────────────────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: creditcheck_api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://creditcheck_user:changeme@postgres:5432/creditcheck_db
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-8h}
      PORT: 3001
      NODE_ENV: ${NODE_ENV:-production}
      ALLOWED_EMAILS: ${ALLOWED_EMAILS}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173}
      RATE_LIMIT_WINDOW_MS: 60000
      RATE_LIMIT_MAX: 100
    ports:
      - "3001:3001"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
