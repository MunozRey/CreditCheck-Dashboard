services:
  - type: web
    name: creditcheck-api
    runtime: node
    rootDir: backend
    buildCommand: npm install && npx prisma generate && npx prisma migrate deploy
    startCommand: node src/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: creditcheck-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 8h
      - key: ALLOWED_EMAILS
        value: david@clovrlabs.com,ferran@clovrlabs.com
      - key: CORS_ORIGIN
        value: https://credit-check-dashboard.vercel.app
      - key: RATE_LIMIT_WINDOW_MS
        value: "60000"
      - key: RATE_LIMIT_MAX
        value: "100"

databases:
  - name: creditcheck-db
    databaseName: creditcheck_db
    user: creditcheck_user
    plan: free
