# ─── Netlify deployment config — CreditCheck Dashboard ────────────────────────
# Build
[build]
  command   = "npm run build"
  publish   = "dist"

# SPA routing — redirect all non-asset requests to index.html
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# ─── Cache headers ─────────────────────────────────────────────────────────────
# index.html — always revalidate so users get the latest app shell
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# Hashed JS/CSS/image assets — immutable for 1 year
# Vite writes content hashes into filenames, so a new deploy = new URL = cache bust
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ─── Security headers (all routes) ────────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options    = "nosniff"
    X-Frame-Options           = "DENY"
    Referrer-Policy           = "no-referrer"
    Permissions-Policy        = "camera=(), microphone=(), geolocation=()"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
